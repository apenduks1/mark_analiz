<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Аналіз оцінок</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// ТУТ ВСТАВИШ СВІЙ FIREBASE CONFIG
const firebaseConfig = {

apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const select = document.getElementById("classSelect");
const tableBody = document.getElementById("tableBody");
const title = document.getElementById("tableTitle");


async function loadData(className){

title.innerText = className;

const docRef = doc(db,"classes",className);
const docSnap = await getDoc(docRef);

if(!docSnap.exists()){
tableBody.innerHTML="<tr><td colspan='9'>Немає даних</td></tr>";
return;
}

const d = docSnap.data();

tableBody.innerHTML = `
<tr>
<td>${d.students}</td>
<td>${d.high}</td>
<td>${d.highPercent}</td>
<td>${d.good}</td>
<td>${d.goodPercent}</td>
<td>${d.middle}</td>
<td>${d.middlePercent}</td>
<td>${d.low}</td>
<td>${d.lowPercent}</td>
</tr>
`;

}

select.addEventListener("change",()=>{

loadData(select.value)

});

window.addEventListener("DOMContentLoaded",()=>{

loadData(select.value)

});

</script>

</head>
